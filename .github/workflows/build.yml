name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri App
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickKit ${{ github.ref_name }}"
          releaseBody: |
            ## QuickKit ${{ github.ref_name }}

            Windows 桌面端快捷工具集。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Upload installer to Qiniu
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        shell: pwsh
        run: |
          if (-not "$env:QINIU_ACCESS_KEY" -or -not "$env:QINIU_SECRET_KEY" -or -not "$env:QINIU_BUCKET") {
            Write-Host "::warning::QINIU 未配置，跳过"
            exit 0
          }
          $tag = "${{ github.ref_name }}"
          $bundleDir = "src-tauri\target\release\bundle"
          $installers = @()
          if (Test-Path "$bundleDir\nsis") {
            Get-ChildItem "$bundleDir\nsis\*.exe" | ForEach-Object { $installers += $_ }
          }
          if (Test-Path "$bundleDir\msi") {
            Get-ChildItem "$bundleDir\msi\*.msi" | ForEach-Object { $installers += $_ }
          }
          if ($installers.Count -eq 0) {
            Write-Host "::warning::未找到安装包"
            exit 0
          }
          $qsVersion = "v2.19.7"
          Invoke-WebRequest -Uri "https://github.com/qiniu/qshell/releases/download/${qsVersion}/qshell-${qsVersion}-windows-amd64.zip" -OutFile qshell.zip
          Expand-Archive -Path qshell.zip -DestinationPath qshell_tmp -Force
          $qsBin = Get-ChildItem -Path qshell_tmp -Filter "qshell*.exe" | Select-Object -First 1
          Move-Item $qsBin.FullName "qshell.exe" -Force
          .\qshell.exe account --overwrite "$env:QINIU_ACCESS_KEY" "$env:QINIU_SECRET_KEY" "quickkit-ci"
          foreach ($installer in $installers) {
            $name = $installer.Name
            $key = "quickkit/${tag}/${name}"
            Write-Host "→ 上传: ${name}"
            .\qshell.exe fput --overwrite "$env:QINIU_BUCKET" "$key" $installer.FullName
          }

      - name: Summary
        if: success()
        shell: bash
        run: |
          echo "## QuickKit ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Windows 安装包已构建并发布" >> "$GITHUB_STEP_SUMMARY"
