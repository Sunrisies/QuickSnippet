name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动触发时使用的版本号（例如 v0.1.0），仅用于命名产物，不会创建 git tag'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Tauri App
        id: tauri_build
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.vars.outputs.tag }}
          releaseName: "QuickKit ${{ steps.vars.outputs.tag }}"
          releaseBody: |
            ## QuickKit ${{ steps.vars.outputs.tag }}

            Windows 桌面端快捷工具集。
          releaseDraft: true
          prerelease: ${{ contains(steps.vars.outputs.tag, '-') }}

      - name: Upload installer to Qiniu
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          QINIU_ACCESS_KEY: ${{ secrets.QINIU_ACCESS_KEY }}
          QINIU_SECRET_KEY: ${{ secrets.QINIU_SECRET_KEY }}
          QINIU_BUCKET: ${{ secrets.QINIU_BUCKET }}
        shell: pwsh
        run: |
          # 检查七牛云配置
          if (-not "$env:QINIU_ACCESS_KEY" -or -not "$env:QINIU_SECRET_KEY" -or -not "$env:QINIU_BUCKET") {
            Write-Host "::warning::七牛云 secrets 未配置，跳过上传"
            exit 0
          }

          $tag = "${{ steps.vars.outputs.tag }}"
          $bundleDir = "src-tauri\target\release\bundle"

          # 查找构建产物（NSIS 安装包）
          $installers = @()
          if (Test-Path "$bundleDir\nsis") {
            Get-ChildItem "$bundleDir\nsis\*.exe" | ForEach-Object { $installers += $_ }
          }
          if (Test-Path "$bundleDir\msi") {
            Get-ChildItem "$bundleDir\msi\*.msi" | ForEach-Object { $installers += $_ }
          }

          if ($installers.Count -eq 0) {
            Write-Host "::warning::未找到安装包文件"
            exit 0
          }

          # 安装 qshell
          $qsVersion = "v2.19.7"
          $qsZip = "qshell.zip"
          Invoke-WebRequest -Uri "https://github.com/qiniu/qshell/releases/download/${qsVersion}/qshell-${qsVersion}-windows-amd64.zip" -OutFile $qsZip
          Expand-Archive -Path $qsZip -DestinationPath qshell_tmp -Force
          $qsBin = Get-ChildItem -Path qshell_tmp -Filter "qshell*.exe" | Select-Object -First 1
          Move-Item $qsBin.FullName "qshell.exe" -Force

          # 配置七牛账号
          .\qshell.exe account --overwrite "$env:QINIU_ACCESS_KEY" "$env:QINIU_SECRET_KEY" "quickkit-ci"

          # 上传每个安装包
          foreach ($installer in $installers) {
            $name = $installer.Name
            $key = "quickkit/${tag}/${name}"
            Write-Host "→ 上传: ${name}  ⇒  qiniu://${env:QINIU_BUCKET}/${key}"
            .\qshell.exe fput --overwrite "$env:QINIU_BUCKET" "$key" $installer.FullName
          }

      - name: Summary
        if: success()
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          echo "## QuickKit $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Windows 安装包已构建" >> "$GITHUB_STEP_SUMMARY"
          echo "- 📦 GitHub Release: 以 draft 形式创建" >> "$GITHUB_STEP_SUMMARY"
